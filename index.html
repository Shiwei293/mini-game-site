<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RFFの小游戏</title>
<style>
:root {
  --bg: #0c0c0c;
  --card-bg: #171717;
  --text: #f1f1f1;
  --text-glow: rgba(0,0,0,0.75);
  --border: #333;
  --ring-stroke: #fff;
  --ring-bright: #fff;
  --dot-color: #fff;
  --hp-empty: #333;
  --hp-full: #fff;
  --hp-glow: rgba(0,0,0,0.6);
  --shadow: 0 10px 32px rgba(0,0,0,0.35);
  --ripple-dark: rgba(255,255,255,0.14);
  --light-radius: 220px;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system;
  transition: var(--trans);
}
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
  position: relative;
  cursor: none;
}
.light-mask {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  background: radial-gradient(circle var(--light-radius) at var(--mouse-x, 50%) var(--mouse-y, 50%), transparent 0%, rgba(0,0,0,1) 100%);
}
.light-visible {
  mix-blend-mode: screen;
}
.no-mask {
  mix-blend-mode: normal !important;
}
.mouse-dot {
  position: fixed;
  width: 22px;
  height: 22px;
  background: var(--dot-color);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 9999;
  transition: none;
  will-change: left, top;
  box-shadow: 0 0 12px #fff, 0 0 40px rgba(255,255,220,0.5), 0 0 80px rgba(255,255,200,0.3);
}
.count-flash-mask {
  position: fixed;
  inset: 0;
  z-index: 40;
  pointer-events: none;
  opacity: 0;
  background: transparent !important;
}
.count-flash-mask.show {
  opacity: 1;
  pointer-events: all;
  background: transparent !important;
}
.start-menu {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  z-index: 50;
  overflow: hidden;
}
.start-menu.hidden {
  opacity: 0;
  pointer-events: none;
  z-index: -1;
}
.ripple {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0);
  width: 50px;
  height: 50px;
  background: var(--ripple-dark);
  animation: rippleClick 0.8s ease-out forwards;
}
@keyframes rippleClick {
  to {
    transform: translate(-50%, -50%) scale(14);
    opacity: 0;
  }
}
.menu-title {
  font-size: 48px;
  font-weight: 600;
}
.menu-desc {
  font-size: 20px;
  opacity: 0.6;
  text-align: center;
  max-width: 600px;
  line-height: 1.8;
}
.menu-record {
  font-size: 24px;
}
.start-btn-menu {
  padding: 18px 56px;
  font-size: 26px;
  border-radius: 999px;
  border: none;
  background: var(--text);
  color: var(--bg);
  cursor: pointer;
  margin-top: 16px;
}
.start-btn-menu:hover {
  scale: 1.05;
}
.result-panel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.result-panel.show {
  opacity: 1;
  pointer-events: all;
}
.result-box {
  background: var(--card-bg);
  padding: 48px 64px;
  border-radius: 20px;
  box-shadow: var(--shadow);
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.result-title {
  font-size: 40px;
  font-weight: 600;
}
.result-buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 10px;
}
.res-btn {
  padding: 14px 36px;
  font-size: 20px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
}
.retry-btn {
  background: var(--text);
  color: var(--bg);
}
.home-btn {
  background: transparent;
  border: 2px solid var(--text);
  color: var(--text);
}
.res-btn:hover {
  scale: 1.05;
}
.game-ui-wrap {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.game-ui-wrap.visible {
  opacity: 1;
  pointer-events: all;
}
.info-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  font-size: 36px;
  font-weight: 500;
  text-shadow: 0 0 6px var(--text-glow), 0 0 12px var(--text-glow);
}
.time-text {
  text-align: center;
}
.hp-row {
  width: 100%;
}
.hp-container {
  width: 100%;
  height: 14px;
  border-radius: 999px;
  background: var(--hp-empty);
  overflow: hidden;
  box-shadow: 0 0 5px var(--hp-glow), 0 0 10px var(--hp-glow);
}
.hp-fill {
  height: 100%;
  width: 100%;
  background: var(--hp-full);
  border-radius: 999px;
  box-shadow: 0 0 4px var(--hp-glow) inset;
  transition: width 0.04s linear;
}
.target-ring {
  position: fixed;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.15s linear, height 0.15s linear;
  z-index: 1;
  animation: ringGlowSpin 2.5s linear infinite;
  border: 3px solid transparent;
  border-top-color: rgba(255,255,255,0.9);
  border-right-color: rgba(255,255,255,0.6);
  border-bottom-color: rgba(255,255,255,0.3);
  border-left-color: transparent;
  box-shadow:
    0 0 8px rgba(255,255,255,0.8),
    0 0 16px rgba(255,255,255,0.5),
    0 0 24px rgba(255,255,255,0.3),
    inset 0 0 12px rgba(255,255,255,0.4);
}
.target-ring.blink {
  border-top-color: #ffffff;
  border-right-color: #ffffff;
  border-bottom-color: #ffffff;
  box-shadow:
    0 0 12px #ffffff,
    0 0 24px rgba(255,255,255,0.8),
    0 0 36px rgba(255,255,255,0.6),
    inset 0 0 18px rgba(255,255,255,0.5);
}
@keyframes ringGlowSpin {
  0% {
    transform: translate(-50%, -50%) rotate(0deg);
  }
  100% {
    transform: translate(-50%, -50%) rotate(360deg);
  }
}
.countdown-text {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 160px;
  font-weight: bold;
  z-index: 45;
  color: #ffffff;
  text-shadow: 0 0 12px rgba(255,255,255,0.9), 0 0 24px rgba(255,255,255,0.6);
}
.bottom-tip {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  opacity: 0;
  pointer-events: none;
  z-index: 10;
  transition: opacity 0.3s;
}
.bottom-tip.visible {
  opacity: 0.6;
  pointer-events: all;
}
</style>
</head>
<body>
<div class="count-flash-mask" id="flashMask"></div>
<div class="mouse-dot" id="dot"></div>
<div class="light-mask"></div>

<div class="start-menu" id="menuBox">
  <h1 class="menu-title">稳态平衡挑战</h1>
  <p class="menu-desc">移动鼠标灯光，只有光照范围内才能看见判定圈；圈内回血，圈外缓慢扣血</p>
  <p class="menu-record">历史最高纪录：<span id="menuBest">0.00</span> 秒</p>
  <button class="start-btn-menu" id="enterGameBtn">开始挑战</button>
</div>

<div class="result-panel" id="resultPanel">
  <div class="result-box">
    <h2 class="result-title" id="resultTitle">挑战结束</h2>
    <p id="newRecordTip" style="color:#22c55e;display:none;">🎉 刷新最高纪录！</p>
    <div class="result-buttons">
      <button class="res-btn retry-btn" id="retryBtn">再来一局</button>
      <button class="res-btn home-btn" id="homeBtn">返回主页</button>
    </div>
  </div>
</div>

<div class="target-ring light-visible" id="ring"></div>
<div class="countdown-text light-visible" id="countText"></div>
<div class="bottom-tip light-visible" id="gameTip">只有鼠标光照区域可见圆环；圈内回血，圈外缓慢扣血</div>

<div class="game-ui-wrap light-visible" id="gameUI">
  <div class="info-row">
    <!-- 时间单独居中 -->
    <div class="time-text">剩余时间：<span id="currentTime">105.00</span>s</div>
    <!-- 只保留血条，删掉血量数字 -->
    <div class="hp-row">
      <div class="hp-container">
        <div class="hp-fill" id="hpBar"></div>
      </div>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  DOT_RADIUS: 11,
  RING_START_SIZE: 60,
  RING_MIN_SIZE: 28,
  RING_SHRINK_SPEED: 0.07,
  REFRESH_SECONDS: 2,
  MAX_HP: 100,
  MIN_HP: 0,
  HEAL_RATE: 2.2,
  DRAIN_RATE: 0.8,
  HP_TICK_MS: 50,
  TOTAL_GAME_TIME: 105,
  BLINK_DELAY: 500,
  HP_LERP_SPEED: 0.08,
  EPS: 0.01,
  GAME_AREA_TOP: 140,
  GAME_AREA_BOTTOM: window.innerHeight - 100,
  GAME_AREA_LEFT: 20,
  GAME_AREA_RIGHT: window.innerWidth - 20,
  SHAKE_STIFFNESS: 0.08,
  SHAKE_DAMPING: 0.14,
  MAX_SHAKE_RANGE: 13
};

const state = {
  playing: false,
  countingDown: false,
  startTime: 0,
  bestScore: Number(localStorage.getItem("balanceMax")) || 0,
  hp: CONFIG.MAX_HP,
  smoothHp: CONFIG.MAX_HP,
  remainTime: CONFIG.TOTAL_GAME_TIME,
  mouseX: window.innerWidth / 2,
  mouseY: window.innerHeight / 2,
  ringX: window.innerWidth / 2,
  ringY: window.innerHeight / 2,
  ringSize: CONFIG.RING_START_SIZE,
  animFrame: null,
  hpTimer: null,
  firstRingSpawn: true,
  shakeX: 0,
  shakeY: 0,
  shakeVelX: 0,
  shakeVelY: 0,
  lightDotX: window.innerWidth / 2,
  lightDotY: window.innerHeight / 2,
  ringStayTimer: 0
};

const el = {
  body: document.body,
  lightMask: document.querySelector(".light-mask"),
  flashMask: document.getElementById("flashMask"),
  countText: document.getElementById("countText"),
  dot: document.getElementById("dot"),
  menuBox: document.getElementById("menuBox"),
  enterGameBtn: document.getElementById("enterGameBtn"),
  menuBest: document.getElementById("menuBest"),
  resultPanel: document.getElementById("resultPanel"),
  newRecordTip: document.getElementById("newRecordTip"),
  retryBtn: document.getElementById("retryBtn"),
  homeBtn: document.getElementById("homeBtn"),
  gameUI: document.getElementById("gameUI"),
  gameTip: document.getElementById("gameTip"),
  ring: document.getElementById("ring"),
  hpBar: document.getElementById("hpBar"),
  currentTime: document.getElementById("currentTime"),
  resultTitle: document.getElementById("resultTitle")
};

let audioInst = null;
function initAudio() {
  const audio = new Audio("bgm.mp3");
  audio.loop = true;
  audio.volume = 0.3;
  return audio;
}

function createRipple(x, y) {
  const ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.left = x + "px";
  ripple.style.top = y + "px";
  el.menuBox.appendChild(ripple);
  setTimeout(() => ripple.remove(), 800);
}
el.menuBox.addEventListener("click", e => createRipple(e.clientX, e.clientY));

function applyRingStyle() {
  el.ring.style.left = state.ringX + "px";
  el.ring.style.top = state.ringY + "px";
  el.ring.style.width = state.ringSize + "px";
  el.ring.style.height = state.ringSize + "px";
}

document.addEventListener("mousemove", e => {
  state.mouseX = e.clientX;
  state.mouseY = e.clientY;
});

document.addEventListener("touchmove", e => {
  e.preventDefault();
  const touch = e.touches[0];
  state.mouseX = touch.clientX;
  state.mouseY = touch.clientY;
}, { passive: false });

function isInRing() {
  const dx = state.lightDotX - state.ringX;
  const dy = state.lightDotY - state.ringY;
  const dist = Math.hypot(dx, dy);
  const r = state.ringSize / 2;
  return dist <= r - CONFIG.DOT_RADIUS;
}

function refreshRing() {
  let randomX, randomY;
  if (state.firstRingSpawn) {
    randomX = window.innerWidth / 2;
    randomY = window.innerHeight / 2;
  } else {
    const rangeX = CONFIG.GAME_AREA_RIGHT - CONFIG.GAME_AREA_LEFT;
    const rangeY = CONFIG.GAME_AREA_BOTTOM - CONFIG.GAME_AREA_TOP;
    randomX = CONFIG.GAME_AREA_LEFT + Math.random() * rangeX;
    randomY = CONFIG.GAME_AREA_TOP + Math.random() * rangeY;
  }
  state.ringSize = CONFIG.RING_START_SIZE;
  state.ringX = randomX;
  state.ringY = randomY;
  state.ringStayTimer = 0;
  if (!state.firstRingSpawn) {
    el.ring.classList.add("blink", "no-mask");
    setTimeout(() => el.ring.classList.remove("blink", "no-mask"), CONFIG.BLINK_DELAY);
  }
  applyRingStyle();
  if (state.firstRingSpawn) state.firstRingSpawn = false;
}

function tickHP() {
  if (!state.playing || state.countingDown) return;
  state.hp += isInRing() ? CONFIG.HEAL_RATE : -CONFIG.DRAIN_RATE;
  state.hp = Math.max(CONFIG.MIN_HP, Math.min(CONFIG.MAX_HP, state.hp));
}

function gameLoop() {
  if (!state.playing) return;
  const targetShakeX = (Math.random() - 0.5) * CONFIG.MAX_SHAKE_RANGE;
  const targetShakeY = (Math.random() - 0.5) * CONFIG.MAX_SHAKE_RANGE;
  state.shakeVelX += (targetShakeX - state.shakeX) * CONFIG.SHAKE_STIFFNESS;
  state.shakeVelY += (targetShakeY - state.shakeY) * CONFIG.SHAKE_DAMPING;
  state.shakeVelX *= (1 - CONFIG.SHAKE_DAMPING);
  state.shakeVelY *= (1 - CONFIG.SHAKE_DAMPING);
  state.shakeX += state.shakeVelX;
  state.shakeY += state.shakeVelY;
  const shakeDist = Math.hypot(state.shakeX, state.shakeY);
  if (shakeDist > CONFIG.MAX_SHAKE_RANGE) {
    const scale = CONFIG.MAX_SHAKE_RANGE / shakeDist;
    state.shakeX *= scale;
    state.shakeY *= scale;
    state.shakeVelX *= 0.4;
    state.shakeVelY *= 0.4;
  }
  state.lightDotX = state.mouseX + state.shakeX;
  state.lightDotY = state.mouseY + state.shakeY;
  el.dot.style.left = state.lightDotX + "px";
  el.dot.style.top = state.lightDotY + "px";
  el.body.style.setProperty("--mouse-x", state.lightDotX + "px");
  el.body.style.setProperty("--mouse-y", state.lightDotY + "px");

  const pass = (Date.now() - state.startTime) / 1000;
  state.remainTime = CONFIG.TOTAL_GAME_TIME - pass;
  el.currentTime.textContent = state.remainTime.toFixed(2);

  if (isInRing()) {
    const deltaFrame = 1 / 60;
    state.ringStayTimer += deltaFrame;
    if (state.ringStayTimer >= CONFIG.REFRESH_SECONDS) {
      refreshRing();
    }
  }

  let shrinkDelta = pass * CONFIG.RING_SHRINK_SPEED;
  state.ringSize = Math.max(CONFIG.RING_MIN_SIZE, CONFIG.RING_START_SIZE - shrinkDelta);
  applyRingStyle();

  if (state.remainTime <= 0) {
    endGame(true);
    return;
  }
  state.smoothHp += (state.hp - state.smoothHp) * CONFIG.HP_LERP_SPEED;
  state.smoothHp = Math.max(CONFIG.MIN_HP, Math.min(CONFIG.MAX_HP, state.smoothHp));
  el.hpBar.style.width = state.smoothHp + "%";
  if (state.smoothHp <= CONFIG.EPS) {
    endGame(false);
    return;
  }
  state.animFrame = requestAnimationFrame(gameLoop);
}

function endGame(isWin) {
  if (!state.playing) return;
  state.playing = false;
  cancelAnimationFrame(state.animFrame);
  clearInterval(state.hpTimer);
  if (audioInst) audioInst.pause();
  const playTime = CONFIG.TOTAL_GAME_TIME - state.remainTime;
  el.newRecordTip.style.display = "none";
  el.resultTitle.textContent = isWin ? "挑战成功" : "挑战失败";
  if (playTime > state.bestScore) {
    state.bestScore = playTime;
    localStorage.setItem("balanceMax", state.bestScore);
    el.menuBest.textContent = state.bestScore.toFixed(2);
    el.newRecordTip.style.display = "block";
  }
  el.resultPanel.classList.add("show");
}

function startCountdown(cb) {
  state.countingDown = true;
  let cnt = 3;
  el.flashMask.classList.add("show");
  const timer = setInterval(() => {
    el.countText.textContent = cnt;
    cnt--;
    if (cnt < 0) {
      clearInterval(timer);
      el.countText.textContent = "";
      el.flashMask.classList.remove("show");
      state.countingDown = false;
      el.gameUI.classList.add("visible");
      el.gameTip.classList.add("visible");
      if (audioInst) {
        audioInst.currentTime = 0;
        audioInst.play().catch(() => {});
      }
      cb();
    }
  }, 1000);
}

function resetGame() {
  if (audioInst) {
    audioInst.pause();
    audioInst.currentTime = 0;
  }
  state.hp = CONFIG.MAX_HP;
  state.smoothHp = CONFIG.MAX_HP;
  state.remainTime = CONFIG.TOTAL_GAME_TIME;
  state.firstRingSpawn = true;
  state.mouseX = window.innerWidth / 2;
  state.mouseY = window.innerHeight / 2;
  state.shakeX = state.shakeY = state.shakeVelX = state.shakeVelY = 0;
  state.lightDotX = state.mouseX;
  state.lightDotY = state.mouseY;
  state.ringSize = CONFIG.RING_START_SIZE;
  state.ringStayTimer = 0;
  el.hpBar.style.width = state.smoothHp + "%";
  el.currentTime.textContent = state.remainTime.toFixed(2);
  el.dot.style.left = state.lightDotX + "px";
  el.dot.style.top = state.lightDotY + "px";
  el.body.style.setProperty("--mouse-x", state.lightDotX + "px");
  el.body.style.setProperty("--mouse-y", state.lightDotY + "px");
  el.resultPanel.classList.remove("show");
  el.gameUI.classList.remove("visible");
  el.gameTip.classList.remove("visible");
  clearInterval(state.hpTimer);
  cancelAnimationFrame(state.animFrame);
  refreshRing();
}

function launchGame() {
  resetGame();
  if (!audioInst) audioInst = initAudio();
  el.menuBox.classList.add("hidden");
  startCountdown(() => {
    state.playing = true;
    state.startTime = Date.now();
    state.hpTimer = setInterval(tickHP, CONFIG.HP_TICK_MS);
    gameLoop();
  });
}

el.enterGameBtn.addEventListener("click", launchGame);
el.retryBtn.addEventListener("click", launchGame);
el.homeBtn.addEventListener("click", () => {
  resetGame();
  if (audioInst) audioInst.pause();
  el.menuBox.classList.remove("hidden");
});

el.body.style.setProperty("--mouse-x", state.mouseX + "px");
el.body.style.setProperty("--mouse-y", state.mouseY + "px");
el.menuBest.textContent = state.bestScore.toFixed(2);
el.currentTime.textContent = state.remainTime.toFixed(2);
applyRingStyle();
</script>
</body>
</html>
