<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>367の小游戏</title>
<style>
:root {
  --bg: #f7f7f7;
  --card-bg: #ffffff;
  --text: #111;
  --text-glow: rgba(255,255,255,0.95);
  --border: #ddd;
  --ring-stroke: #000;
  --ring-bright: #fff;
  --dot-color: #000;
  --hp-empty: #ddd;
  --hp-full: #111;
  --hp-glow: rgba(255,255,255,0.85);
  --shadow: 0 10px 32px rgba(0,0,0,0.08);
  --trans: all 0.32s cubic-bezier(0.22, 0, 0.2, 1);
  --ripple-light: rgba(0,0,0,0.1);
  --ripple-dark: rgba(255,255,255,0.14);
}
.dark-mode {
  --bg: #0c0c0c;
  --card-bg: #171717;
  --text: #f1f1f1;
  --text-glow: rgba(0,0,0,0.75);
  --border: #333;
  --ring-stroke: #fff;
  --ring-bright: #fff;
  --dot-color: #fff;
  --hp-empty: #333;
  --hp-full: #fff;
  --hp-glow: rgba(0,0,0,0.6);
  --shadow: 0 10px 32px rgba(0,0,0,0.35);
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system;
  transition: var(--trans);
}
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
  position: relative;
  cursor: none;
}
/* 鼠标圆点零延迟 */
.mouse-dot {
  position: fixed;
  width: 22px;
  height: 22px;
  background: var(--dot-color);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 9999;
  transition: none;
  will-change: left, top;
}
button:hover ~ .mouse-dot {
  background: var(--bg);
}
/* 倒计时黑白闪屏 */
.count-flash-mask {
  position: fixed;
  inset: 0;
  z-index: 40;
  pointer-events: none;
  opacity: 0;
}
.count-flash-mask.show {
  opacity: 1;
  pointer-events: all;
}
/* 明暗切换按钮 */
.theme-switch {
  position: fixed;
  top: 22px;
  right: 22px;
  padding: 9px 18px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  border-radius: 999px;
  cursor: pointer;
  box-shadow: var(--shadow);
  z-index: 99;
}
.theme-switch:hover {
  transform: translateY(-2px);
}
/* 音频弹窗 */
.audio-tip-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.tip-box {
  background: var(--card-bg);
  padding: 40px 50px;
  border-radius: 16px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 24px;
  max-width: 480px;
}
.tip-title {
  font-size: 28px;
  font-weight: bold;
}
.tip-text {
  font-size: 18px;
  line-height: 1.6;
  opacity: 0.8;
}
.confirm-tip-btn {
  padding: 14px 40px;
  font-size: 20px;
  border-radius: 999px;
  border: none;
  background: var(--text);
  color: var(--bg);
  cursor: pointer;
  margin: 0 auto;
}
.confirm-tip-btn:hover {
  scale: 1.05;
}
/* 主菜单 */
.start-menu {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  z-index: 50;
  overflow: hidden;
}
.start-menu.hidden {
  opacity: 0;
  pointer-events: none;
  z-index: -1;
}
.ripple {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0);
  width: 50px;
  height: 50px;
  background: var(--ripple-light);
  animation: rippleClick 0.8s ease-out forwards;
}
.dark-mode .ripple {
  background: var(--ripple-dark);
}
@keyframes rippleClick {
  to {
    transform: translate(-50%, -50%) scale(14);
    opacity: 0;
  }
}
.menu-title {
  font-size: 48px;
  font-weight: 600;
}
.menu-desc {
  font-size: 20px;
  opacity: 0.6;
  text-align: center;
  max-width: 600px;
  line-height: 1.8;
}
.menu-record {
  font-size: 24px;
}
.start-btn-menu {
  padding: 18px 56px;
  font-size: 26px;
  border-radius: 999px;
  border: none;
  background: var(--text);
  color: var(--bg);
  cursor: pointer;
  margin-top: 16px;
}
.start-btn-menu:hover {
  scale: 1.05;
}
/* 结算弹窗（删除时长、历史最高） */
.result-panel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 60;
  opacity: 0;
  pointer-events: none;
}
.result-panel.show {
  opacity: 1;
  pointer-events: all;
}
.result-box {
  background: var(--card-bg);
  padding: 48px 64px;
  border-radius: 20px;
  box-shadow: var(--shadow);
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.result-title {
  font-size: 40px;
  font-weight: 600;
}
.result-buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 10px;
}
.res-btn {
  padding: 14px 36px;
  font-size: 20px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
}
.retry-btn {
  background: var(--text);
  color: var(--bg);
}
.home-btn {
  background: transparent;
  border: 2px solid var(--text);
  color: var(--text);
}
.res-btn:hover {
  scale: 1.05;
}
/* 游戏UI 文字发光 */
.game-ui-wrap {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
}
.game-ui-wrap.visible {
  opacity: 1;
  pointer-events: all;
}
.info-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 16px;
  font-size: 36px;
  font-weight: 500;
  text-shadow: 0 0 6px var(--text-glow), 0 0 12px var(--text-glow);
}
/* 血条顺滑过渡 */
.hp-container {
  width: 100%;
  height: 14px;
  border-radius: 999px;
  background: var(--hp-empty);
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: 0 0 5px var(--hp-glow), 0 0 10px var(--hp-glow);
}
.hp-fill {
  height: 100%;
  width: 100%;
  background: var(--hp-full);
  border-radius: 999px;
  box-shadow: 0 0 4px var(--hp-glow) inset;
  transition: width 0.04s linear;
}
/* 目标圆环 + 自身闪烁 */
.target-ring {
  position: absolute;
  border: 3px solid var(--ring-stroke);
  border-radius: 50%;
  transition: left 0.4s ease, top 0.4s ease, width 0.4s ease, height 0.4s ease, border-color 0.1s ease, box-shadow 0.1s ease;
  z-index: 1;
}
.target-ring.blink {
  border-color: var(--ring-bright);
  box-shadow: 0 0 12px var(--ring-bright), 0 0 24px var(--ring-bright);
}
.countdown-text {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 160px;
  font-weight: bold;
  z-index: 45;
  text-shadow: 0 0 8px var(--text-glow);
}
.bottom-tip {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  opacity: 0;
  pointer-events: none;
  z-index: 10;
}
.bottom-tip.visible {
  opacity: 0.6;
  pointer-events: all;
}
</style>
</head>
<body>
<button class="theme-switch" id="themeBtn">切换黑白模式</button>
<div class="count-flash-mask" id="flashMask"></div>
<div class="mouse-dot" id="dot"></div>

<div class="audio-tip-modal" id="audioTipModal">
  <div class="tip-box">
    <div class="tip-title">音频提示</div>
    <div class="tip-text">
      进入游戏倒计时结束后会自动播放背景音乐，声音可能突然响起；
      若对突发声音敏感，请提前调低设备音量后再确认。
    </div>
    <button class="confirm-tip-btn" id="confirmTipBtn">我已严肃知晓</button>
  </div>
</div>

<div class="start-menu" id="menuBox">
  <h1 class="menu-title">稳态平衡挑战</h1>
  <p class="menu-desc">移动鼠标控制圆点，保持圆点圆心在圆圈内持续回血；<br>默认挑战难度，圆环随机大小，不会随时间缩小</p>
  <p class="menu-record">历史最高纪录：<span id="menuBest">0.00</span> 秒</p>
  <button class="start-btn-menu" id="enterGameBtn">开始挑战</button>
</div>

<div class="result-panel" id="resultPanel">
  <div class="result-box">
    <h2 class="result-title" id="resultTitle">挑战结束</h2>
    <p id="newRecordTip" style="color:#22c55e;display:none;">🎉 刷新最高纪录！</p>
    <div class="result-buttons">
      <button class="res-btn retry-btn" id="retryBtn">再来一局</button>
      <button class="res-btn home-btn" id="homeBtn">返回主页</button>
    </div>
  </div>
</div>

<div class="game-ui-wrap" id="gameUI">
  <div class="info-row">
    <div>剩余时间：<span id="currentTime">60.00</span>s</div>
    <div>血量：<span id="bestRecord">100</span></div>
  </div>
  <div class="hp-container">
    <div class="hp-fill" id="hpBar"></div>
  </div>
</div>

<div class="target-ring" id="ring"></div>
<div class="countdown-text" id="countText"></div>
<div class="bottom-tip" id="gameTip">待在圈里别动，像西游记那样</div>

<script>
// 全局常量
const CONFIG = {
  DOT_RADIUS: 11,
  RING_MIN_SIZE: 45,
  RING_MAX_SIZE: 80,
  MAX_HP: 100,
  MIN_HP: 0,
  HEAL_RATE: 2.2,
  DRAIN_RATE: 1.4,
  DRAIN_MUL: 2.0,
  MAX_OFFSET_FACTOR: 0.9,
  AREA_TOP_OFFSET: 180,
  REFRESH_INTERVAL: 3000,
  HP_TICK_MS: 50,
  TOTAL_GAME_TIME: 60,
  BLINK_DELAY: 100,
  HP_LERP_SPEED: 0.08,
  EPS: 0.01 // 浮点误差容差，小于该值视为血量0
};

// 游戏状态
const state = {
  playing: false,
  countingDown: false,
  lockPointer: false,
  darkMode: false,
  startTime: 0,
  bestScore: Number(localStorage.getItem("balanceMax")) || 0,
  hp: CONFIG.MAX_HP,
  smoothHp: CONFIG.MAX_HP,
  remainTime: CONFIG.TOTAL_GAME_TIME,
  mouseX: window.innerWidth / 2,
  mouseY: window.innerHeight / 2,
  ringX: window.innerWidth / 2,
  ringY: window.innerHeight / 2,
  ringSize: 60,
  ringOpacity: 1,
  animFrame: null,
  ringTimer: null,
  hpTimer: null,
  firstRingSpawn: true
};

// DOM缓存
const el = {
  body: document.body,
  themeBtn: document.getElementById("themeBtn"),
  flashMask: document.getElementById("flashMask"),
  countText: document.getElementById("countText"),
  dot: document.getElementById("dot"),
  menuBox: document.getElementById("menuBox"),
  enterGameBtn: document.getElementById("enterGameBtn"),
  menuBest: document.getElementById("menuBest"),
  resultPanel: document.getElementById("resultPanel"),
  newRecordTip: document.getElementById("newRecordTip"),
  retryBtn: document.getElementById("retryBtn"),
  homeBtn: document.getElementById("homeBtn"),
  gameUI: document.getElementById("gameUI"),
  gameTip: document.getElementById("gameTip"),
  ring: document.getElementById("ring"),
  hpBar: document.getElementById("hpBar"),
  currentTime: document.getElementById("currentTime"),
  bestRecord: document.getElementById("bestRecord"),
  resultTitle: document.getElementById("resultTitle"),
  audioTipModal: document.getElementById("audioTipModal"),
  confirmTipBtn: document.getElementById("confirmTipBtn")
};

// 音频
let audioInst = null;
let audioReady = false;
function initAudio() {
  const audio = new Audio("bgm.mp3");
  audio.loop = true;
  audio.volume = 0.3;
  audio.addEventListener("canplaythrough", () => {
    audioReady = true;
    audioInst = audio;
  });
  audio.addEventListener("error", () => {
    audioReady = false;
    audioInst = null;
  });
}
initAudio();

// 菜单波纹
function createRipple(x, y) {
  const ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.left = x + "px";
  ripple.style.top = y + "px";
  el.menuBox.appendChild(ripple);
  setTimeout(() => ripple.remove(), 800);
}
el.menuBox.addEventListener("click", e => createRipple(e.clientX, e.clientY));

// 圆环样式刷新
function applyRingStyle() {
  el.ring.style.width = state.ringSize + "px";
  el.ring.style.height = state.ringSize + "px";
  el.ring.style.left = state.ringX + "px";
  el.ring.style.top = state.ringY + "px";
  el.ring.style.transform = "translate(-50%, -50%)";
  el.ring.style.opacity = state.ringOpacity;
}

// 明暗切换
el.themeBtn.addEventListener("click", () => {
  state.darkMode = !state.darkMode;
  el.body.classList.toggle("dark-mode", state.darkMode);
});

// 鼠标移动 极简赋值无延迟
document.addEventListener("mousemove", e => {
  state.mouseX = e.clientX;
  state.mouseY = e.clientY;
  if (!state.lockPointer) {
    el.dot.style.left = state.mouseX + "px";
    el.dot.style.top = state.mouseY + "px";
  }
});

// 触摸 极简赋值
document.addEventListener("touchmove", e => {
  e.preventDefault();
  const touch = e.touches[0];
  state.mouseX = touch.clientX;
  state.mouseY = touch.clientY;
  if (!state.lockPointer) {
    el.dot.style.left = state.mouseX + "px";
    el.dot.style.top = state.mouseY + "px";
  }
}, { passive: false });

// 碰撞检测
function isInRing() {
  const dx = state.mouseX - state.ringX;
  const dy = state.mouseY - state.ringY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const r = state.ringSize / 2;
  return dist <= r - CONFIG.DOT_RADIUS;
}

// 刷新圆环位置+0.1秒闪烁
function refreshRing() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const cx = w / 2;
  const cy = h / 2;
  const halfR = state.ringSize / 2;
  const minY = CONFIG.AREA_TOP_OFFSET + halfR;
  const maxY = h - halfR;

  state.ringSize = CONFIG.RING_MIN_SIZE + Math.random() * (CONFIG.RING_MAX_SIZE - CONFIG.RING_MIN_SIZE);

  if (state.firstRingSpawn) {
    state.ringX = cx;
    state.ringY = cy;
    state.firstRingSpawn = false;
  } else {
    el.ring.classList.add("blink");
    setTimeout(() => el.ring.classList.remove("blink"), CONFIG.BLINK_DELAY);
    const maxOff = w * CONFIG.MAX_OFFSET_FACTOR;
    const ox = (Math.random() * 2 - 1) * maxOff;
    const oy = (Math.random() * 2 - 1) * (h * CONFIG.MAX_OFFSET_FACTOR);
    let tx = cx + ox;
    let ty = cy + oy;
    tx = Math.max(halfR, Math.min(w - halfR, tx));
    ty = Math.max(minY, Math.min(maxY, ty));
    state.ringX = tx;
    state.ringY = ty;
  }
  applyRingStyle();
}

// 血量增减：仅区间钳位，无任何结束判定
function tickHP() {
  if (!state.playing || state.countingDown) return;
  if (isInRing()) {
    state.hp += CONFIG.HEAL_RATE;
  } else {
    state.hp -= CONFIG.DRAIN_RATE * CONFIG.DRAIN_MUL;
  }
  // 严格锁定血量区间0~100
  state.hp = Math.max(CONFIG.MIN_HP, Math.min(CONFIG.MAX_HP, state.hp));
}

// 渲染循环：浮点容错判定，血量接近0自动结算
function gameLoop() {
  if (!state.playing) return;
  const pass = (Date.now() - state.startTime) / 1000;
  state.remainTime = CONFIG.TOTAL_GAME_TIME - pass;
  el.currentTime.textContent = state.remainTime.toFixed(2);
  // 时间耗尽 → 胜利
  if (state.remainTime <= 0) {
    endGame(true);
    return;
  }
  // 平滑插值血量
  state.smoothHp += (state.hp - state.smoothHp) * CONFIG.HP_LERP_SPEED;
  state.smoothHp = Math.max(CONFIG.MIN_HP, Math.min(CONFIG.MAX_HP, state.smoothHp));
  const displayHp = Math.floor(state.smoothHp);
  // 血条宽度与浮点血量完全绑定同步
  el.hpBar.style.width = state.smoothHp + "%";
  el.bestRecord.textContent = displayHp;
  // 修复浮点精度BUG：血量小于误差容差视为空，触发失败
  if (state.smoothHp < CONFIG.EPS) {
    endGame(false);
    return;
  }
  state.animFrame = requestAnimationFrame(gameLoop);
}

// 游戏结束统一处理
function endGame(isWin) {
  state.playing = false;
  cancelAnimationFrame(state.animFrame);
  clearInterval(state.ringTimer);
  clearInterval(state.hpTimer);
  if (audioReady && audioInst) {
    audioInst.pause();
    audioInst.currentTime = 0;
  }
  const playTime = CONFIG.TOTAL_GAME_TIME - state.remainTime;
  el.newRecordTip.style.display = "none";
  el.resultTitle.textContent = isWin ? "挑战成功" : "挑战失败";
  if (playTime > state.bestScore) {
    state.bestScore = playTime;
    localStorage.setItem("balanceMax", state.bestScore);
    el.menuBest.textContent = state.bestScore.toFixed(2);
    el.newRecordTip.style.display = "block";
  }
  el.resultPanel.classList.add("show");
}

// 321倒计时
function startCountdown(cb) {
  state.countingDown = true;
  state.lockPointer = true;
  let cnt = 3;
  el.flashMask.classList.add("show");
  const timer = setInterval(() => {
    el.countText.textContent = cnt;
    el.flashMask.style.background = cnt === 3 || cnt === 1 ? "#fff" : "#000";
    el.countText.style.color = cnt === 3 || cnt === 1 ? "#000" : "#fff";
    cnt--;
    if (cnt < 0) {
      clearInterval(timer);
      el.countText.textContent = "";
      el.flashMask.classList.remove("show");
      el.flashMask.style.background = "";
      state.countingDown = false;
      state.lockPointer = false;
      el.gameUI.classList.add("visible");
      el.gameTip.classList.add("visible");
      if (audioReady && audioInst) audioInst.play().catch(() => {});
      cb();
    }
  }, 1000);
}

// 重置游戏
function resetGame() {
  state.hp = CONFIG.MAX_HP;
  state.smoothHp = CONFIG.MAX_HP;
  state.remainTime = CONFIG.TOTAL_GAME_TIME;
  state.firstRingSpawn = true;
  state.mouseX = state.ringX;
  state.mouseY = state.ringY;
  el.hpBar.style.width = state.smoothHp + "%";
  el.bestRecord.textContent = Math.floor(state.smoothHp);
  el.currentTime.textContent = state.remainTime.toFixed(2);
  el.dot.style.left = state.mouseX + "px";
  el.dot.style.top = state.mouseY + "px";
  el.resultPanel.classList.remove("show");
  el.gameUI.classList.remove("visible");
  el.gameTip.classList.remove("visible");
  clearInterval(state.ringTimer);
  clearInterval(state.hpTimer);
  cancelAnimationFrame(state.animFrame);
  refreshRing();
}

// 启动游戏
function launchGame() {
  resetGame();
  startCountdown(() => {
    state.playing = true;
    state.startTime = Date.now();
    state.ringTimer = setInterval(refreshRing, CONFIG.REFRESH_INTERVAL);
    state.hpTimer = setInterval(tickHP, CONFIG.HP_TICK_MS);
    gameLoop();
  });
}

// 按钮绑定
el.enterGameBtn.addEventListener("click", () => {
  el.audioTipModal.style.display = "flex";
});
el.confirmTipBtn.addEventListener("click", () => {
  el.audioTipModal.style.display = "none";
  el.menuBox.classList.add("hidden");
  launchGame();
});
el.retryBtn.addEventListener("click", launchGame);
el.homeBtn.addEventListener("click", () => {
  resetGame();
  if (audioReady && audioInst) {
    audioInst.pause();
    audioInst.currentTime = 0;
  }
  el.menuBox.classList.remove("hidden");
});

// 初始化页面
el.menuBest.textContent = state.bestScore.toFixed(2);
el.bestRecord.textContent = Math.floor(state.smoothHp);
el.currentTime.textContent = state.remainTime.toFixed(2);
applyRingStyle();
</script>
</body>
</html>
