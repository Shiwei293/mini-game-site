<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>稳态平衡挑战</title>
<style>
:root {
  --bg: #0c0c0c;
  --card-bg: #171717;
  --text: #f1f1f1;
  --text-glow: rgba(0,0,0,0.4);
  --border: #333;
  --ring-stroke: #fff;
  --ring-bright: #fff;
  --dot-color: #fff;
  --hp-empty: #222;
  --hp-normal: #eee;
  --hp-danger: #ff4444;
  --hp-glow: rgba(0,0,0,0.6);
  --shadow: 0 10px 32px rgba(0,0,0,0.35);
  --ripple-dark: rgba(255,255,255,0.14);
  --light-radius: 220px;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system;
  transition: var(--trans);
}
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
  position: relative;
  cursor: none;
  user-select: none;
  -webkit-user-select: none;
}
.light-mask {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  background: radial-gradient(circle var(--light-radius) at var(--mouse-x, 50%) var(--mouse-y, 50%), transparent 0%, rgba(0,0,0,1) 100%);
}
.light-mask.hide {
  display: none;
}
.light-visible {
  mix-blend-mode: screen;
}
.no-mask {
  mix-blend-mode: normal !important;
}
.mouse-dot {
  position: fixed;
  width: 22px;
  height: 22px;
  background: var(--dot-color);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 9999;
  transition: none;
  will-change: left, top;
  box-shadow: 0 0 12px #fff, 0 0 30px rgba(255,255,220,0.4), 0 0 60px rgba(255,255,200,0.2);
}
.count-flash-mask {
  position: fixed;
  inset: 0;
  z-index: 40;
  pointer-events: none;
  opacity: 0;
  background: transparent !important;
}
.count-flash-mask.show {
  opacity: 1;
  pointer-events: all;
  background: transparent !important;
}
/* 暂停弹窗 */
.pause-panel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 70;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.pause-panel.show {
  opacity: 1;
  pointer-events: all;
}
.pause-box {
  background: var(--card-bg);
  padding: 48px 60px;
  border-radius: 20px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 28px;
}
.pause-title {
  font-size: 42px;
  font-weight: 600;
}
.pause-btn-group {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.pause-btn {
  padding: 14px 40px;
  font-size: 22px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
}
.pause-continue {
  background: var(--text);
  color: var(--bg);
}
.pause-restart {
  background: #2277dd;
  color: #fff;
}
.pause-home {
  background: #dd3333;
  color: #fff;
}
.pause-btn:hover {
  scale: 1.05;
}
/* 重置确认弹窗 */
.reset-confirm-panel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 65;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.reset-confirm-panel.show {
  opacity: 1;
  pointer-events: all;
}
.reset-confirm-box {
  background: var(--card-bg);
  padding: 40px 50px;
  border-radius: 18px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.reset-confirm-title {
  font-size: 36px;
  font-weight: 600;
  color: #ff6666;
}
.reset-confirm-desc {
  font-size: 19px;
  color: #ccc;
}
.reset-confirm-buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
}
.reset-confirm-btn {
  padding: 12px 34px;
  font-size: 20px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
}
.confirm-reset {
  background: #dd3333;
  color: white;
}
.refuse-reset {
  background: transparent;
  border: 2px solid #aaa;
  color: #eee;
}
.reset-confirm-btn:hover {
  scale: 1.05;
}
/* 角落快捷键提示 */
.tip-key-left {
  position: fixed;
  bottom: 20px;
  left: 20px;
  font-size: 16px;
  color: rgba(255,255,255,0.45);
  z-index: 8;
  pointer-events: none;
  transition: opacity 0.8s ease;
}
.tip-key-right {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 16px;
  color: rgba(255,255,255,0.45);
  z-index: 8;
  pointer-events: none;
  transition: opacity 0.8s ease;
}
.tip-fadeout {
  opacity: 0;
}
.start-menu {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 50;
  overflow: hidden;
}
.start-menu.hidden {
  opacity: 0;
  pointer-events: none;
  z-index: -1;
}
.ripple {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0);
  width: 50px;
  height: 50px;
  background: var(--ripple-dark);
  animation: rippleClick 0.8s ease-out forwards;
}
@keyframes rippleClick {
  to {
    transform: translate(-50%, -50%) scale(14);
    opacity: 0;
  }
}
.menu-title {
  font-size: 48px;
  font-weight: 600;
}
.menu-desc {
  font-size: 20px;
  opacity: 0.6;
  text-align: center;
  max-width: 600px;
  line-height: 1.8;
}
.menu-record {
  font-size: 24px;
}
.menu-round {
  font-size: 22px;
  color: #aaa;
}
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 10px;
}
.menu-btn {
  padding: 16px 52px;
  font-size: 24px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
}
.start-btn {
  background: var(--text);
  color: var(--bg);
}
.continue-btn {
  background: #2277dd;
  color: #fff;
  display: none;
}
.reset-btn {
  background: #dd3333;
  color: #fff;
  display: none;
}
.menu-btn:hover {
  scale: 1.05;
}
.result-panel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.result-panel.show {
  opacity: 1;
  pointer-events: all;
}
.result-box {
  background: var(--card-bg);
  padding: 48px 64px;
  border-radius: 20px;
  box-shadow: var(--shadow);
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.result-title {
  font-size: 40px;
  font-weight: 600;
}
.result-sub {
  font-size: 20px;
  color: #bbb;
}
.result-buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 10px;
}
.res-btn {
  padding: 14px 36px;
  font-size: 20px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
}
.primary-btn {
  background: var(--text);
  color: var(--bg);
}
.home-btn {
  background: transparent;
  border: 2px solid var(--text);
  color: var(--text);
}
.res-btn:hover {
  scale: 1.05;
}
.game-ui-wrap {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.game-ui-wrap.visible {
  opacity: 1;
  pointer-events: all;
}
.info-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  font-size: 36px;
  font-weight: 500;
  text-shadow: 0 0 4px var(--text-glow), 0 0 8px var(--text-glow);
}
.time-text {
  text-align: center;
}
.hp-row {
  width: 100%;
}
.hp-container {
  width: 100%;
  height: 14px;
  border-radius: 999px;
  background: var(--hp-empty);
  overflow: hidden;
  box-shadow: 0 0 5px var(--hp-glow), 0 0 10px var(--hp-glow);
}
.hp-fill {
  height: 100%;
  width: 100%;
  border-radius: 999px;
  box-shadow: 0 0 4px var(--hp-glow) inset;
  transition: width 0.04s linear, background 0.2s;
  background: var(--hp-normal);
}
.hp-fill.danger {
  background: var(--hp-danger);
  animation: hpFlash 0.6s infinite alternate;
}
@keyframes hpFlash {
  from {opacity:0.7;}
  to {opacity:1;}
}
/* 判定圈柔和淡入淡出过渡 */
.target-ring {
  position: fixed;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.15s linear, height 0.15s linear, opacity 0.3s ease;
  z-index: 1;
  animation: ringGlowSpin 2.5s linear infinite;
  border: 3px solid transparent;
  border-top-color: rgba(255,255,255,0.9);
  border-right-color: rgba(255,255,255,0.6);
  border-bottom-color: rgba(255,255,255,0.3);
  border-left-color: transparent;
  box-shadow:
    0 0 8px rgba(255,255,255,0.6),
    0 0 16px rgba(255,255,255,0.3),
    0 0 24px rgba(255,255,255,0.15),
    inset 0 0 12px rgba(255,255,255,0.3);
  opacity: 1;
}
.target-ring.blink {
  opacity: 0.6;
  border-top-color: #ffffff;
  border-right-color: #ffffff;
  border-bottom-color: #ffffff;
  box-shadow:
    0 0 10px #ffffff,
    0 0 20px rgba(255,255,255,0.4),
    0 0 30px rgba(255,255,255,0.25),
    inset 0 0 15px rgba(255,255,255,0.3);
}
@keyframes ringGlowSpin {
  0% {
    transform: translate(-50%, -50%) rotate(0deg);
  }
  100% {
    transform: translate(-50%, -50%) rotate(360deg);
  }
}
.countdown-text {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 160px;
  font-weight: bold;
  z-index: 45;
  color: #ffffff;
  text-shadow: 0 0 12px rgba(255,255,255,0.9), 0 0 24px rgba(255,255,255,0.6);
}
.bottom-tip {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  opacity: 0;
  pointer-events: none;
  z-index: 10;
  transition: opacity 0.8s;
}
.bottom-tip.show {
  opacity: 0.6;
}
.bottom-tip.fadeout {
  opacity: 0;
}
</style>
</head>
<body>
<div class="count-flash-mask" id="flashMask"></div>
<div class="mouse-dot" id="dot"></div>
<div class="light-mask" id="maskBg"></div>

<!-- 快捷键角落提示 -->
<div class="tip-key-left" id="tipLeft">ESC 暂停游戏</div>
<div class="tip-key-right" id="tipRight">R快速重开，ESC/空格取消暂停</div>

<!-- 重置确认弹窗 -->
<div class="reset-confirm-panel" id="resetConfirmPanel">
  <div class="reset-confirm-box">
    <h2 class="reset-confirm-title">确认重置进度？</h2>
    <p class="reset-confirm-desc">重置后所有轮次难度将清空，回到第1轮初始难度，此操作不可撤销</p>
    <div class="reset-confirm-buttons">
      <button class="reset-confirm-btn refuse-reset" id="refuseResetBtn">拒绝</button>
      <button class="reset-confirm-btn confirm-reset" id="confirmResetBtn">确认</button>
    </div>
  </div>
</div>

<!-- 暂停弹窗 -->
<div class="pause-panel" id="pausePanel">
  <div class="pause-box">
    <h2 class="pause-title">游戏暂停</h2>
    <div class="pause-btn-group">
      <button class="pause-btn pause-continue" id="pauseContinue">继续游戏</button>
      <button class="pause-btn pause-restart" id="pauseRestart">重新开始</button>
      <button class="pause-btn pause-home" id="pauseHome">返回大厅</button>
    </div>
  </div>
</div>

<div class="start-menu" id="menuBox">
  <h1 class="menu-title">稳态平衡挑战</h1>
  <p class="menu-desc">移动鼠标灯光，圈内回血，圈外扣血；累计停留圈内自动刷新判定圈</p>
  <p class="menu-record">历史最高纪录：<span id="menuBest">0.00</span> 秒</p>
  <p class="menu-round" id="roundText">当前轮次：第1轮</p>
  <div class="btn-group">
    <button class="menu-btn start-btn" id="enterGameBtn">开始游戏（第1轮）</button>
    <button class="menu-btn continue-btn" id="continueBtn">继续进度（下一轮）</button>
    <button class="menu-btn reset-btn" id="resetBtn">重置全部进度</button>
  </div>
</div>

<div class="result-panel" id="resultPanel">
  <div class="result-box">
    <h2 class="result-title" id="resultTitle">挑战结束</h2>
    <p class="result-sub" id="resultSub"></p>
    <p id="newRecordTip" style="color:#22c55e;display:none;">🎉 刷新最高纪录！</p>
    <div class="result-buttons">
      <button class="res-btn primary-btn" id="primaryBtn">再来一局</button>
      <button class="res-btn home-btn" id="homeBtn">返回大厅</button>
    </div>
  </div>
</div>

<div class="target-ring light-visible" id="ring"></div>
<div class="countdown-text light-visible" id="countText"></div>
<div class="bottom-tip light-visible" id="gameTip">只有鼠标光照区域可见圆环；圈内回血，圈外缓慢扣血</div>

<div class="game-ui-wrap light-visible" id="gameUI">
  <div class="info-row">
    <div class="time-text">剩余时间：<span id="currentTime">105.00</span>s</div>
    <div class="hp-row">
      <div class="hp-container">
        <div class="hp-fill" id="hpBar"></div>
      </div>
    </div>
  </div>
</div>

<script>
const BASE_CONFIG = {
  DOT_RADIUS: 11,
  RING_START_SIZE: 60,
  RING_MIN_SIZE: 28,
  TOTAL_GAME_TIME: 105,
  BLINK_DELAY: 500,
  HP_LERP_SPEED: 0.08,
  EPS: 0.01,
  HP_WARN_THRESHOLD: 25,
  HP_TICK_MS: 50,
  HEAL_RATE: 2.2,
  TIP_DISPLAY_SEC: 4,
  FRAME_RATE: 60,
  SHAKE_STIFFNESS: 0.08,
  SHAKE_DAMPING: 0.14,
  GAME_AREA_TOP: 120,
  GAME_AREA_LEFT: 30,
  MAX_HP: 100,
  MIN_HP: 0,
  BASE_REFRESH_SEC: 2,
  MIN_REFRESH_SEC: 0.8,
  BASE_DRAIN: 0.8,
  MAX_DRAIN: 2.2,
  BASE_SHRINK: 0.07,
  MAX_SHRINK: 0.18,
  BASE_SHAKE_RANGE: 13,
  MAX_SHAKE_RANGE: 28,
  MASK_RADIUS_STAGE1: 220,
  MASK_RADIUS_STAGE2: 450,
  MASK_RADIUS_STAGE3: 700
};

let winW = window.innerWidth;
let winH = window.innerHeight;

let saveData = JSON.parse(localStorage.getItem("balanceSave")) || {
  bestScore: 0,
  currentRound: 1,
  unlockedAdvance: false
};

const state = {
  playing: false,
  countingDown: false,
  isPaused: false,
  startTime: 0,
  pauseTimeOffset: 0,
  remainTime: BASE_CONFIG.TOTAL_GAME_TIME,
  mouseX: winW / 2,
  mouseY: winH / 2,
  ringX: winW / 2,
  ringY: winH / 2,
  ringSize: BASE_CONFIG.RING_START_SIZE,
  animFrame: null,
  hpTimer: null,
  firstRingSpawn: true,
  shakeX: 0,
  shakeY: 0,
  shakeVelX: 0,
  shakeVelY: 0,
  lightDotX: winW / 2,
  lightDotY: winH / 2,
  ringStayTimer: 0,
  tipShowTime: 0,
  pageVisible: true,
  refreshSec: BASE_CONFIG.BASE_REFRESH_SEC,
  drainRate: BASE_CONFIG.BASE_DRAIN,
  shrinkSpeed: BASE_CONFIG.BASE_SHRINK,
  shakeRange: BASE_CONFIG.BASE_SHAKE_RANGE,
  maskRadius: BASE_CONFIG.MASK_RADIUS_STAGE1,
  isAdvanceRun: false
};

const el = {
  body: document.body,
  maskBg: document.getElementById("maskBg"),
  flashMask: document.getElementById("flashMask"),
  countText: document.getElementById("countText"),
  dot: document.getElementById("dot"),
  menuBox: document.getElementById("menuBox"),
  enterGameBtn: document.getElementById("enterGameBtn"),
  continueBtn: document.getElementById("continueBtn"),
  resetBtn: document.getElementById("resetBtn"),
  menuBest: document.getElementById("menuBest"),
  roundText: document.getElementById("roundText"),
  resultPanel: document.getElementById("resultPanel"),
  newRecordTip: document.getElementById("newRecordTip"),
  primaryBtn: document.getElementById("primaryBtn"),
  homeBtn: document.getElementById("homeBtn"),
  gameUI: document.getElementById("gameUI"),
  gameTip: document.getElementById("gameTip"),
  ring: document.getElementById("ring"),
  hpBar: document.getElementById("hpBar"),
  currentTime: document.getElementById("currentTime"),
  resultTitle: document.getElementById("resultTitle"),
  resultSub: document.getElementById("resultSub"),
  pausePanel: document.getElementById("pausePanel"),
  pauseContinue: document.getElementById("pauseContinue"),
  pauseRestart: document.getElementById("pauseRestart"),
  pauseHome: document.getElementById("pauseHome"),
  tipLeft: document.getElementById("tipLeft"),
  tipRight: document.getElementById("tipRight"),
  // 重置确认弹窗
  resetConfirmPanel: document.getElementById("resetConfirmPanel"),
  confirmResetBtn: document.getElementById("confirmResetBtn"),
  refuseResetBtn: document.getElementById("refuseResetBtn")
};

let audioInst = null;
function initAudio() {
  if (audioInst) return audioInst;
  const audio = new Audio("bgm.mp3");
  audio.loop = true;
  audio.volume = 0.3;
  audioInst = audio;
  return audio;
}

function saveProgress() {
  localStorage.setItem("balanceSave", JSON.stringify(saveData));
}

function updateMenuUI() {
  el.menuBest.textContent = saveData.bestScore.toFixed(2);
  el.roundText.textContent = `当前轮次：第${saveData.currentRound}轮`;
  el.continueBtn.style.display = saveData.unlockedAdvance ? "block" : "none";
  el.resetBtn.style.display = saveData.currentRound > 1 ? "block" : "none";
}

function createRipple(x, y) {
  const ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.left = x + "px";
  ripple.style.top = y + "px";
  el.menuBox.appendChild(ripple);
  setTimeout(() => ripple.remove(), 800);
}
el.menuBox.addEventListener("click", e => createRipple(e.clientX, e.clientY));

function applyRingStyle() {
  el.ring.style.left = state.ringX + "px";
  el.ring.style.top = state.ringY + "px";
  el.ring.style.width = state.ringSize + "px";
  el.ring.style.height = state.ringSize + "px";
}

function setMousePos(x, y) {
  state.mouseX = x;
  state.mouseY = y;
}
document.addEventListener("mousemove", e => setMousePos(e.clientX, e.clientY));
document.addEventListener("touchmove", e => {
  e.preventDefault();
  const t = e.touches[0];
  setMousePos(t.clientX, t.clientY);
}, { passive: false });

function getDist(x1, y1, x2, y2) {
  const dx = x1 - x2;
  const dy = y1 - y2;
  return Math.sqrt(dx * dx + dy * dy);
}

function isInRing() {
  const dist = getDist(state.lightDotX, state.lightDotY, state.ringX, state.ringY);
  const realRadius = state.ringSize / 2;
  return dist <= realRadius - BASE_CONFIG.DOT_RADIUS;
}

function refreshRing() {
  const minX = BASE_CONFIG.GAME_AREA_LEFT;
  const maxX = winW - BASE_CONFIG.GAME_AREA_LEFT;
  const minY = BASE_CONFIG.GAME_AREA_TOP;
  const maxY = winH - 100;

  let randomX, randomY;
  if (state.firstRingSpawn) {
    randomX = winW / 2;
    randomY = winH / 2;
  } else {
    randomX = minX + Math.random() * (maxX - minX);
    randomY = minY + Math.random() * (maxY - minY);
  }
  state.ringStayTimer = 0;
  state.ringSize = BASE_CONFIG.RING_START_SIZE;
  state.ringX = randomX;
  state.ringY = randomY;

  if (!state.firstRingSpawn) {
    el.ring.classList.add("blink", "no-mask");
    setTimeout(() => el.ring.classList.remove("blink", "no-mask"), BASE_CONFIG.BLINK_DELAY);
  }
  applyRingStyle();
  if (state.firstRingSpawn) state.firstRingSpawn = false;
}

function tickHP() {
  if (!state.playing || state.countingDown || state.isPaused) return;
  state.hp += isInRing() ? BASE_CONFIG.HEAL_RATE : -state.drainRate;
  state.hp = Math.max(BASE_CONFIG.MIN_HP, Math.min(BASE_CONFIG.MAX_HP, state.hp));
}

function setMaskEffect() {
  el.body.style.setProperty("--light-radius", state.maskRadius + "px");
  if (saveData.currentRound >= 4) {
    el.maskBg.classList.add("hide");
  } else {
    el.maskBg.classList.remove("hide");
  }
}

function calcDifficulty(round) {
  let refresh = BASE_CONFIG.BASE_REFRESH_SEC - (round - 1) * 0.2;
  refresh = Math.max(refresh, BASE_CONFIG.MIN_REFRESH_SEC);
  let drain = BASE_CONFIG.BASE_DRAIN + (round - 1) * 0.2;
  drain = Math.min(drain, BASE_CONFIG.MAX_DRAIN);
  let shrink = BASE_CONFIG.BASE_SHRINK + (round - 1) * 0.03;
  shrink = Math.min(shrink, BASE_CONFIG.MAX_SHRINK);
  let shake = BASE_CONFIG.BASE_SHAKE_RANGE + (round - 1) * 2;
  shake = Math.min(shake, BASE_CONFIG.MAX_SHAKE_RANGE);
  let maskR;
  if (round === 1) maskR = BASE_CONFIG.MASK_RADIUS_STAGE1;
  else if (round === 2) maskR = BASE_CONFIG.MASK_RADIUS_STAGE2;
  else if (round === 3) maskR = BASE_CONFIG.MASK_RADIUS_STAGE3;
  else maskR = 9999;
  return { refresh, drain, shrink, shake, maskR };
}

// 暂停/恢复
function togglePause() {
  if (!state.playing || state.countingDown || el.resultPanel.classList.contains("show")) return;
  if (state.isPaused) {
    state.isPaused = false;
    const pauseDuration = (Date.now() - state.pauseTimeOffset) / 1000;
    state.startTime += pauseDuration * 1000;
    el.pausePanel.classList.remove("show");
    if (audioInst) audioInst.play().catch(()=>{});
  } else {
    state.isPaused = true;
    state.pauseTimeOffset = Date.now();
    el.pausePanel.classList.add("show");
    if (audioInst) audioInst.pause();
  }
}

// R键重开当前轮
function restartCurrentRound() {
  if (!state.playing || state.countingDown) return;
  launchGame(saveData.currentRound, state.isAdvanceRun);
}

function gameLoop() {
  if (!state.playing || !state.pageVisible || state.isPaused) {
    state.animFrame = requestAnimationFrame(gameLoop);
    return;
  }
  const targetShakeX = (Math.random() - 0.5) * state.shakeRange;
  const targetShakeY = (Math.random() - 0.5) * state.shakeRange;
  state.shakeVelX += (targetShakeX - state.shakeX) * BASE_CONFIG.SHAKE_STIFFNESS;
  state.shakeVelY += (targetShakeY - state.shakeY) * BASE_CONFIG.SHAKE_DAMPING;
  state.shakeVelX *= (1 - BASE_CONFIG.SHAKE_DAMPING);
  state.shakeVelY *= (1 - BASE_CONFIG.SHAKE_DAMPING);
  state.shakeX += state.shakeVelX;
  state.shakeY += state.shakeVelY;

  const shakeDist = getDist(state.shakeX, state.shakeY, 0, 0);
  if (shakeDist > state.shakeRange) {
    const scale = state.shakeRange / shakeDist;
    state.shakeX *= scale;
    state.shakeY *= scale;
    state.shakeVelX *= 0.4;
    state.shakeVelY *= 0.4;
  }
  state.lightDotX = state.mouseX + state.shakeX;
  state.lightDotY = state.mouseY + state.shakeY;

  el.dot.style.left = state.lightDotX + "px";
  el.dot.style.top = state.lightDotY + "px";
  el.body.style.setProperty("--mouse-x", state.lightDotX + "px");
  el.body.style.setProperty("--mouse-y", state.lightDotY + "px");

  const pass = (Date.now() - state.startTime) / 1000;
  state.remainTime = BASE_CONFIG.TOTAL_GAME_TIME - pass;
  el.currentTime.textContent = state.remainTime.toFixed(2);

  if (pass > state.tipShowTime + BASE_CONFIG.TIP_DISPLAY_SEC) {
    el.tipLeft.classList.add("tip-fadeout");
    el.tipRight.classList.add("tip-fadeout");
  }

  if (pass > state.tipShowTime + BASE_CONFIG.TIP_DISPLAY_SEC) {
    el.gameTip.classList.add("fadeout");
  }

  if (isInRing()) {
    const deltaFrame = 1 / BASE_CONFIG.FRAME_RATE;
    state.ringStayTimer += deltaFrame;
    if (state.ringStayTimer >= state.refreshSec) {
      refreshRing();
    }
  }

  const shrinkDelta = pass * state.shrinkSpeed;
  state.ringSize = Math.max(BASE_CONFIG.RING_MIN_SIZE, BASE_CONFIG.RING_START_SIZE - shrinkDelta);
  applyRingStyle();

  if (state.remainTime <= 0) {
    endGame(true);
    return;
  }

  state.smoothHp += (state.hp - state.smoothHp) * BASE_CONFIG.HP_LERP_SPEED;
  state.smoothHp = Math.max(BASE_CONFIG.MIN_HP, Math.min(BASE_CONFIG.MAX_HP, state.smoothHp));
  const hpPercent = state.smoothHp;
  el.hpBar.style.width = hpPercent + "%";
  if (hpPercent <= BASE_CONFIG.HP_WARN_THRESHOLD) {
    el.hpBar.classList.add("danger");
  } else {
    el.hpBar.classList.remove("danger");
  }

  if (state.smoothHp <= BASE_CONFIG.EPS) {
    endGame(false);
    return;
  }
  state.animFrame = requestAnimationFrame(gameLoop);
}

function endGame(isWin) {
  if (!state.playing) return;
  state.playing = false;
  cancelAnimationFrame(state.animFrame);
  clearInterval(state.hpTimer);
  if (audioInst) audioInst.pause();
  const playTime = BASE_CONFIG.TOTAL_GAME_TIME - state.remainTime;
  el.newRecordTip.style.display = "none";

  if (state.isAdvanceRun) {
    el.primaryBtn.textContent = "继续游戏";
  } else {
    el.primaryBtn.textContent = "再来一局";
  }

  if (isWin) {
    el.resultTitle.textContent = "挑战成功";
    el.resultSub.textContent = `第${saveData.currentRound}轮通关`;
    saveData.unlockedAdvance = true;
    saveData.currentRound += 1;
    if (playTime > saveData.bestScore) {
      saveData.bestScore = playTime;
      el.newRecordTip.style.display = "block";
    }
    saveProgress();
  } else {
    el.resultTitle.textContent = "挑战失败";
    el.resultSub.textContent = `止步第${saveData.currentRound}轮`;
  }
  el.resultPanel.classList.add("show");
  updateMenuUI();
}

function startCountdown(cb) {
  state.countingDown = true;
  let cnt = 3;
  el.flashMask.classList.add("show");
  const timer = setInterval(() => {
    el.countText.textContent = cnt;
    cnt--;
    if (cnt < 0) {
      clearInterval(timer);
      el.countText.textContent = "";
      el.flashMask.classList.remove("show");
      state.countingDown = false;
      el.gameUI.classList.add("visible");
      el.gameTip.classList.add("show");
      el.tipLeft.classList.remove("tip-fadeout");
      el.tipRight.classList.remove("tip-fadeout");
      state.tipShowTime = (Date.now() - state.startTime) / 1000;
      setMaskEffect();
      if (audioInst) {
        audioInst.currentTime = 0;
        audioInst.play().catch(() => {});
      }
      cb();
    }
  }, 1000);
}

function resetGame() {
  if (audioInst) {
    audioInst.pause();
    audioInst.currentTime = 0;
  }
  cancelAnimationFrame(state.animFrame);
  clearInterval(state.hpTimer);

  state.hp = BASE_CONFIG.MAX_HP;
  state.smoothHp = BASE_CONFIG.MAX_HP;
  state.remainTime = BASE_CONFIG.TOTAL_GAME_TIME;
  state.firstRingSpawn = true;
  state.mouseX = winW / 2;
  state.mouseY = winH / 2;
  state.shakeX = state.shakeY = state.shakeVelX = state.shakeVelY = 0;
  state.lightDotX = state.mouseX;
  state.lightDotY = state.mouseY;
  state.ringSize = BASE_CONFIG.RING_START_SIZE;
  state.ringStayTimer = 0;
  state.tipShowTime = 0;
  state.isPaused = false;

  el.hpBar.style.width = state.smoothHp + "%";
  el.hpBar.classList.remove("danger");
  el.currentTime.textContent = state.remainTime.toFixed(2);
  el.dot.style.left = state.lightDotX + "px";
  el.dot.style.top = state.lightDotY + "px";
  el.body.style.setProperty("--mouse-x", state.lightDotX + "px");
  el.body.style.setProperty("--mouse-y", state.lightDotY + "px");

  el.resultPanel.classList.remove("show");
  el.pausePanel.classList.remove("show");
  el.gameUI.classList.remove("visible");
  el.gameTip.classList.remove("show", "fadeout");
  el.tipLeft.classList.remove("tip-fadeout");
  el.tipRight.classList.remove("tip-fadeout");
  el.maskBg.classList.remove("hide");
  refreshRing();
}

function launchGame(targetRound, isAdvance) {
  resetGame();
  initAudio();
  const diff = calcDifficulty(targetRound);
  state.refreshSec = diff.refresh;
  state.drainRate = diff.drain;
  state.shrinkSpeed = diff.shrink;
  state.shakeRange = diff.shake;
  state.maskRadius = diff.maskR;
  state.isAdvanceRun = isAdvance;

  el.menuBox.classList.add("hidden");
  startCountdown(() => {
    state.playing = true;
    state.startTime = Date.now();
    state.hpTimer = setInterval(tickHP, BASE_CONFIG.HP_TICK_MS);
    gameLoop();
  });
}

// 键盘全局监听
document.addEventListener("keydown", e => {
  if (e.key === "Escape") togglePause();
  if (e.key === " " && state.isPaused) togglePause();
  if ((e.key === "r" || e.key === "R") && state.playing && !state.countingDown) restartCurrentRound();
});

// 暂停按钮
el.pauseContinue.addEventListener("click", togglePause);
el.pauseRestart.addEventListener("click", () => launchGame(saveData.currentRound, state.isAdvanceRun));
el.pauseHome.addEventListener("click", () => {
  resetGame();
  el.menuBox.classList.remove("hidden");
});

// 重置进度弹窗按钮
el.resetBtn.addEventListener("click", () => {
  el.resetConfirmPanel.classList.add("show");
});
el.refuseResetBtn.addEventListener("click", () => {
  el.resetConfirmPanel.classList.remove("show");
});
el.confirmResetBtn.addEventListener("click", () => {
  saveData = { bestScore: saveData.bestScore, currentRound: 1, unlockedAdvance: false };
  saveProgress();
  el.resetConfirmPanel.classList.remove("show");
  updateMenuUI();
});

// 菜单按钮
el.enterGameBtn.addEventListener("click", () => {
  saveData.currentRound = 1;
  saveProgress();
  launchGame(1, false);
});
el.continueBtn.addEventListener("click", () => launchGame(saveData.currentRound, true));
// 结算主按钮
el.primaryBtn.addEventListener("click", () => launchGame(saveData.currentRound, state.isAdvanceRun));
el.homeBtn.addEventListener("click", () => {
  resetGame();
  if (audioInst) audioInst.pause();
  el.menuBox.classList.remove("hidden");
});

document.addEventListener("visibilitychange", () => {
  state.pageVisible = !document.hidden;
  if (!state.pageVisible && state.playing && !state.isPaused) togglePause();
});

window.addEventListener("resize", () => {
  winW = window.innerWidth;
  winH = window.innerHeight;
});

updateMenuUI();
el.body.style.setProperty("--mouse-x", state.mouseX + "px");
el.body.style.setProperty("--mouse-y", state.mouseY + "px");
applyRingStyle();
state.animFrame = requestAnimationFrame(gameLoop);
</script>
</body>
